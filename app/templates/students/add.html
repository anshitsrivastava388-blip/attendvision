{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block navbar_title %}Add Student{% endblock %}
{% block content %}
<div class="panel form-panel">
  <form method="POST" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Roll Number</label>
        <input type="text" name="roll_number" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Department</label>
        <input type="text" name="department" class="form-control" placeholder="Computer Science" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Year</label>
        <input type="text" name="year" class="form-control" placeholder="2nd Year" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Section</label>
        <input type="text" name="section" class="form-control" placeholder="A" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Photo (optional reference photo)</label>
        <input type="file" name="photo" class="form-control" accept="image/*">
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('students.list_students') }}" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save & Continue to Face Registration</button>
    </div>
  </form>
</div>
{% endblock %}
