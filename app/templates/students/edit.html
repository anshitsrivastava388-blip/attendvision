{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block navbar_title %}Edit Student{% endblock %}
{% block content %}
<div class="panel form-panel">
  <form method="POST" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Roll Number</label>
        <input type="text" name="roll_number" class="form-control" value="{{ student.roll_number }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Department</label>
        <input type="text" name="department" class="form-control" value="{{ student.department }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Year</label>
        <input type="text" name="year" class="form-control" value="{{ student.year }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Section</label>
        <input type="text" name="section" class="form-control" value="{{ student.section }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Replace Photo</label>
        <input type="file" name="photo" class="form-control" accept="image/*">
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('students.list_students') }}" class="btn btn-outline-secondary">Cancel</a>
      <a href="{{ url_for('face.register_face', student_id=student.id) }}" class="btn btn-outline-primary"><i class="fa-solid fa-camera"></i> Re-register Face</a>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
